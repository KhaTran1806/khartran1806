<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Đại học Trà Vinh</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* Toàn bộ cấu trúc trang */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
/*Back ve index */
        .back-btn{
    position:fixed;
    top:20px;
    left:20px;

    background:#ffcfec;
    color:#fff;
    text-decoration:none;

    padding:14px 22px;
    border-radius:15px;

    display:flex;
    align-items:center;
    gap:10px;

    font-weight:600;

    box-shadow:0 8px 20px rgba(0,0,0,.15);
}
        /* Khung đăng nhập trung tâm */
        .login-card {
            background: #ffffff;
            width: 100%;
            max-width: 480px;
            padding: 40px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        /* Logo TVU */
        .logo-container img {
            width: 100px;
            height: auto;
            margin-bottom: 20px;
        }

        /* Tiêu đề phần mềm */
        .title {
            font-size: 15px;
            font-weight: bold;
            color: #222;
            line-height: 1.5;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* Ô nhập liệu nhóm */
        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #1a73e8;
        }

        /* Định vị Icon nằm bên phải ô input */
        .input-group i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #777;
            font-size: 16px;
        }

        /* Hàng chứa ghi nhớ và nút Đăng nhập */
        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .remember-me {
            font-size: 14px;
            color: #333;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .remember-me input {
            margin-right: 8px;
        }

        /* Nút đăng nhập mặc định */
        .btn-submit {
            background-color: #17569b;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: #12447c;
        }

        /* Các nút đăng nhập bằng Microsoft / TVU Email */
        .btn-oauth {
            display: block;
            width: 100%;
            padding: 12px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            border-radius: 4px;
            margin-bottom: 12px;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .btn-oauth:hover {
            opacity: 0.9;
        }

        .btn-ms {
            background-color: #1e5494; /* Màu xanh của Microsoft option */
        }

        .btn-tvu {
            background-color: #a61d24; /* Màu đỏ của Giảng viên option */
        }

        /* Link quên mật khẩu */
        .forgot-password {
            display: block;
            text-align: left;
            font-size: 14px;
            color: #17569b;
            text-decoration: none;
            margin-top: 15px;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">
    <i class="fa-solid fa-arrow-left"></i>
    Quay lại Trang Chủ
</a>

    <div class="login-card">
        <div class="logo-container">
            <img src="logo/tvu.png" alt="TVU Logo" onerror="this.src='https://via.placeholder.com/100?text=TVU'">
        </div>

        <div class="title">
            Phần mềm tin học<br>
            Đánh giá kết quả rèn luyện cho sinh viên chính quy<br>
            tại đại học trà vinh
        </div>

        <form action="#">
            <div class="input-group">
                <input type="email" placeholder="Email" required>
                <i class="fa-solid fa-envelope"></i>
            </div>
            
            <div class="input-group">
                <input type="password" placeholder="Mật khẩu" required>
                <i class="fa-solid fa-lock"></i>
            </div>

            <div class="action-row">
                <label class="remember-me">
                    <input type="checkbox"> Nhớ mật khẩu
                </label>
                <button type="submit" class="btn-submit">Đăng nhập</button>
            </div>
        </form>

        <a href="#" class="btn-oauth btn-ms">Sinh viên (Đăng nhập bằng Email Microsoft)</a>
        <a href="#" class="btn-oauth btn-tvu">Giảng viên (Đăng nhập bằng Email TVU)</a>

        <a href="#" class="forgot-password">Quên mật khẩu?</a>
    </div>

</body>
</html>
